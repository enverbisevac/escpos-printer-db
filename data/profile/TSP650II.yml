---
TSP650II:
  name: TSP650II Series
  vendor: "Star Micronics"
  inherits: default
  notes: >
      Star TSP650II thermal receipt printer (80mm). High-speed thermal
      printer with StarPRNT command protocol.
  features:
    starCommands: true
    barcodeA: true
    barcodeB: true
    bitImageRaster: true
    bitImageColumn: true
    qrCode: true
    paperFullCut: true
    paperPartCut: true
  fonts:
